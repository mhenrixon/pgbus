plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Style/FormatStringToken:
  Enabled: false

Metrics:
  Enabled: false

Naming/MethodParameterName:
  AllowedNames:
    - vt
    - id
    - n
    - m
    - io

Layout/LineLength:
  Max: 140

RSpec/ExampleLength:
  Max: 20
  Exclude:
    # Integration specs orchestrate multi-phase scenarios (connect → broadcast
    # → disconnect → reconnect → assert) that legitimately need more than
    # 20 lines to express clearly.
    - spec/integration/**/*

RSpec/MultipleExpectations:
  Enabled: false

RSpec/NestedGroups:
  Max: 4

RSpec/LeakyConstantDeclaration:
  Enabled: false

RSpec/IdenticalEqualityAssertion:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/DescribeClass:
  Exclude:
    - spec/integration/**/*
    - spec/i18n_spec.rb

RSpec/AnyInstance:
  Enabled: false

RSpec/SubjectStub:
  Enabled: false

RSpec/InstanceVariable:
  Exclude:
    - spec/system/**/*
    # Integration specs use @saved_* instance vars to snapshot and restore
    # global Pgbus configuration between suites — the idiomatic rspec
    # alternative (shared_context with around hooks) is much more verbose
    # for the same semantics.
    - spec/integration/**/*

RSpec/BeforeAfterAll:
  Exclude:
    # Integration tests legitimately need before(:all) for expensive setup
    # like booting Puma or flipping Pgbus.configuration — running it
    # per-example would triple the suite runtime.
    - spec/integration/**/*

Naming/PredicateMethod:
  Exclude:
    - spec/**/*

Lint/UnusedMethodArgument:
  Exclude:
    - spec/system/support/**/*
